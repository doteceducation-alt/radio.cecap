<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio CECAP Rivera</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="player-container">
        <img src="logo.png" alt="Logo Radio CECAP" id="logoRadio" style="width: 150px; border-radius: 50%;">
        
        <h1>Radio CECAP Rivera</h1>
        <p>Transmitiendo en vivo desde nuestros estudios en Domingo A. Lor 1625, Rivera, Uruguay</p>

        <div class="visualizer" id="visualizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <audio id="radioStream" src="https://radios.yanapak.org/cecap" preload="none"></audio>

        <button id="playBtn">▶️ Escuchar</button>

        <div class="volume-container">
            <span style="font-size: 20px;">🔈</span>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
            <span style="font-size: 20px;">🔊</span>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // --- 1. ELEMENTOS DEL REPRODUCTOR ---
        const audio = document.getElementById('radioStream');
        const playBtn = document.getElementById('playBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const visualizer = document.getElementById('visualizer');
        const tituloRadio = document.querySelector('h1');
        const subtituloRadio = document.querySelector('p');

        audio.volume = 0.5; 

        // --- 2. PEGA AQUÍ TU FIREBASE CONFIG DEL PROYECTO ROBOCLASS ---
        const firebaseConfig = {
            apiKey: "AIzaSyCs4PnCfDpGvEP5kKbIFe6H-QgF1HVAtWE",
            authDomain: "roboclass-b929a.firebaseapp.com",
            projectId: "roboclass-b929a",
            storageBucket: "roboclass-b929a.firebasestorage.app",
            messagingSenderId: "719167351070",
            appId: "1:719167351070:web:3d5df1e151eed11748810f"
        };

        // --- 3. INICIALIZAR FIREBASE ---
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let playlist = [];
        let cancionActual = 0;
        let autoDjActivo = false;

        // --- 4. CARGAR LA PLAYLIST DE EMERGENCIA ---
        db.collection("playlist_emergencia")
          .where("activa", "==", true)
          .orderBy("orden")
          .get()
          .then((querySnapshot) => {
              querySnapshot.forEach((doc) => {
                  playlist.push(doc.data());
              });
              console.log("Playlist de emergencia cargada:", playlist.length, "canciones.");
          }).catch((error) => {
              console.log("Error al cargar playlist:", error);
          });

        // --- 5. EL "SWITCH": DETECTAR CAÍDA DE SEÑAL ---
        function activarAutoDJ() {
            if (playlist.length > 0 && !autoDjActivo) {
                autoDjActivo = true;
                reproducirCancion(0);
                playBtn.innerHTML = '⏸️ Pausar';
            } else if (playlist.length === 0) {
                console.log("No hay canciones en la playlist de emergencia.");
            }
        }

        function reproducirCancion(indice) {
            if (indice >= playlist.length) {
                indice = 0; // Vuelve a empezar si llega al final
            }
            cancionActual = indice;
            const cancion = playlist[indice];

            // Verificamos que escribiste bien 'url_audio' en Firebase
            if (!cancion.url_audio) {
                console.error("¡Cuidado! No se encontró el campo 'url_audio' en Firebase para esta canción.");
                return;
            }

            console.log("AutoDJ reproduciendo:", cancion.titulo);
            
            audio.src = cancion.url_audio;
            
            // Reproducimos la canción de emergencia
            audio.play().then(() => {
                visualizer.classList.add('active');
                tituloRadio.innerText = "AutoDJ Activado";
                subtituloRadio.innerText = "🎶 " + cancion.titulo + " - " + cancion.artista;
            }).catch(error => {
                console.error("El enlace MP3 de emergencia está roto o bloqueado:", error);
            });
        }

        // Pasar a la siguiente canción automáticamente
        audio.addEventListener('ended', () => {
            if (autoDjActivo) {
                reproducirCancion(cancionActual + 1);
            }
        });

        // --- 6. CONTROLES INTELIGENTES ---
        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                // Intentamos reproducir el en vivo (Yanapak)
                audio.play().then(() => {
                    // Si Yanapak está encendido, funciona normal
                    playBtn.innerHTML = '⏸️ Pausar';
                    visualizer.classList.add('active');
                }).catch((error) => {
                    // Si Yanapak está apagado, atrapamos el error y lanzamos la música
                    console.log("Señal principal apagada. Iniciando AutoDJ...");
                    activarAutoDJ();
                });
            } else {
                audio.pause();
                playBtn.innerHTML = '▶️ Escuchar';
                visualizer.classList.remove('active');
            }
        });

        volumeSlider.addEventListener('input', (e) => {
            audio.volume = e.target.value;
        });
        // --- 7. DETECTOR DE RETORNO AL VIVO ---
        // Cada 15 segundos revisamos si RadioBOSS volvió
        setInterval(() => {
            if (autoDjActivo) {
                console.log("AutoDJ activo. Verificando si RadioBOSS volvió...");
                
                // Creamos un audio invisible para "probar" la señal de Yanapak
                let testAudio = new Audio("https://radios.yanapak.org/cecap?test=" + Date.now());
                testAudio.volume = 0; // Silencio total
                
                testAudio.play().then(() => {
                    console.log("¡Señal de RadioBOSS detectada! Volviendo al vivo...");
                    autoDjActivo = false;
                    testAudio.pause();
                    
                    // Volvemos a la fuente original
                    audio.src = "https://radios.yanapak.org/cecap";
                    audio.play();
                    
                    // Restauramos los textos originales
                    tituloRadio.innerText = "Radio CECAP Rivera";
                    subtituloRadio.innerText = "Transmitiendo en vivo...";
                }).catch(() => {
                    console.log("RadioBOSS sigue apagado. Continúa el AutoDJ.");
                });
            }
        }, 15000); // 15 segundos es un buen tiempo para no saturar
    </script>
</body>
</html>
