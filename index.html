<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio CECAP Rivera</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Ajuste para el QR */
        .qr-section {
            margin-top: 30px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .qr-section img {
            width: 100px;
            height: 100px;
            border: 3px solid white;
            border-radius: 10px;
        }
        .qr-text {
            font-size: 14px;
            text-align: left;
            line-height: 1.2;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="player-container">
        <img src="logocecap.jpg" alt="Logo CECAP" id="logoRadio" 
             style="width: 150px; border-radius: 50%; cursor: pointer; border: 3px solid white;" 
             onclick="accesoAdmin()">
        
        <h1>Radio CECAP Rivera</h1>
        <p id="subtitulo">Transmitiendo en vivo desde Rivera, Uruguay</p>

        <div class="visualizer" id="visualizer">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div>
        </div>

        <audio id="radioStream" src="https://radios.yanapak.org/cecap" preload="none"></audio>

        <button id="playBtn">▶️ Escuchar</button>

        <div id="contadorContenedor" style="margin-top: 15px; font-size: 14px; color: #fff; font-weight: bold;">
            👁️ <span id="numOyentes">0</span> oyentes en línea
        </div>

        <div class="volume-container">
            <span>🔈</span>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
            <span>🔊</span>
        </div>

        <div class="qr-section">
            <img src="qr-radio.png" alt="Escanéame">
            <div class="qr-text">
                ¡ESCANEA Y<br>COMPARTE LA<br>RADIO DE CECAP!
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        function accesoAdmin() {
            const claveCorrecta = "cecap2026"; 
            const intento = prompt("🔒 Área restringida. Ingresa la contraseña:");
            if (intento === claveCorrecta) window.location.href = "admin.html";
            else if (intento !== null) alert("❌ Acceso denegado.");
        }

        const audio = document.getElementById('radioStream');
        const playBtn = document.getElementById('playBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const visualizer = document.getElementById('visualizer');
        const tituloRadio = document.querySelector('h1');
        const subtituloRadio = document.getElementById('subtitulo');
        const numOyentesElemento = document.getElementById('numOyentes');

        const firebaseConfig = {
            apiKey: "AIzaSyCs4PnCfDpGvEP5kKbIFe6H-QgF1HVAtWE",
            authDomain: "roboclass-b929a.firebaseapp.com",
            projectId: "roboclass-b929a",
            storageBucket: "roboclass-b929a.firebasestorage.app",
            messagingSenderId: "719167351070",
            appId: "1:719167351070:web:3d5df1e151eed11748810f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let playlist = [];
        let cancionActual = 0;
        let autoDjActivo = false;

        db.collection("playlist_emergencia").where("activa", "==", true).orderBy("orden").get().then((snap) => {
            snap.forEach((doc) => playlist.push(doc.data()));
        });

        function reproducirCancion(indice) {
            if (indice >= playlist.length) indice = 0;
            cancionActual = indice;
            const cancion = playlist[indice];
            audio.src = cancion.url_audio;
            audio.play().then(() => {
                autoDjActivo = true;
                visualizer.classList.add('active');
                tituloRadio.innerText = "AutoDJ Activado";
                subtituloRadio.innerText = "🎶 " + cancion.titulo + " - " + cancion.artista;
            });
        }

        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play().then(() => {
                    playBtn.innerHTML = '⏸️ Pausar';
                    visualizer.classList.add('active');
                }).catch(() => {
                    if(playlist.length > 0) reproducirCancion(0);
                });
            } else {
                audio.pause();
                playBtn.innerHTML = '▶️ Escuchar';
                visualizer.classList.remove('active');
            }
        });

        volumeSlider.addEventListener('input', (e) => audio.volume = e.target.value);

        setInterval(() => {
            if (autoDjActivo) {
                let test = new Audio("https://radios.yanapak.org/cecap?nc=" + Date.now());
                test.volume = 0;
                test.play().then(() => {
                    autoDjActivo = false;
                    test.pause();
                    audio.pause();
                    audio.src = "https://radios.yanapak.org/cecap";
                    audio.play();
                    tituloRadio.innerText = "Radio CECAP Rivera";
                    subtituloRadio.innerText = "Transmitiendo en vivo...";
                }).catch(() => console.log("Vivo offline"));
            }
        }, 20000);

        async function gestionarOyente() {
            const ref = await db.collection("oyentes_activos").add({ t: Date.now() });
            window.addEventListener('unload', () => ref.delete());
        }
        db.collection("oyentes_activos").onSnapshot(snap => numOyentesElemento.innerText = snap.size);
        gestionarOyente();
    </script>
</body>
</html>
