<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio CECAP Rivera</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="player-container">
        <img src="logo.png" alt="Logo Radio CECAP" id="logoRadio" style="width: 150px; border-radius: 50%;">
        
        <h1>Radio CECAP Rivera</h1>
        <p>Transmitiendo en vivo desde nuestros estudios en Domingo A. Lor 1625, Rivera, Uruguay</p>

        <div class="visualizer" id="visualizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <audio id="radioStream" src="https://radios.yanapak.org/cecap" preload="none"></audio>

        <button id="playBtn">▶️ Escuchar</button>

        <div class="volume-container">
            <span style="font-size: 20px;">🔈</span>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
            <span style="font-size: 20px;">🔊</span>
        </div>
    </div>

    <script>
        const audio = document.getElementById('radioStream');
        const playBtn = document.getElementById('playBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const visualizer = document.getElementById('visualizer');

        // Control de Play/Pausa y Animación
        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playBtn.innerHTML = '⏸️ Pausar';
                visualizer.classList.add('active'); // Enciende las luces
            } else {
                audio.pause();
                playBtn.innerHTML = '▶️ Escuchar';
                visualizer.classList.remove('active'); // Apaga las luces
            }
        });

        // Control de Volumen
        volumeSlider.addEventListener('input', (e) => {
            audio.volume = e.target.value;
        });
    </script>
</body>
</html>
