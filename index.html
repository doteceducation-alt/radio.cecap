<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio CECAP Rivera</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="player-container">
        <img src="logocecap.jpg" alt="Logo Radio CECAP" id="logoRadio" 
     style="width: 150px; border-radius: 50%; cursor: pointer;" 
     onclick="accesoAdmin()">
        
        <h1>Radio CECAP Rivera</h1>
        <p>Transmitiendo en vivo desde nuestros estudios en Domingo A. Lor 1625, Rivera, Uruguay</p>

        <div class="visualizer" id="visualizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <audio id="radioStream" src="https://radios.yanapak.org/cecap" preload="none"></audio>

        <button id="playBtn">▶️ Escuchar</button>
        <div id="contadorContenedor" style="margin-top: 15px; font-size: 14px; color: #666; font-weight: bold;">
    👁️ <span id="numOyentes">0</span> oyentes en línea
        </div>

        <div class="volume-container">
            <span style="font-size: 20px;">🔈</span>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
            <span style="font-size: 20px;">🔊</span>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // --- FUNCIÓN DE ACCESO SECRETO AL ADMIN ---
        function accesoAdmin() {
            const claveCorrecta = "cecap2026"; 
            const intento = prompt("🔒 Área restringida. Ingresa la contraseña de administrador:");
            if (intento === claveCorrecta) {
                window.location.href = "admin.html";
            } else if (intento !== null) {
                alert("❌ Contraseña incorrecta. Acceso denegado.");
            }
        }

        // --- 1. ELEMENTOS DEL REPRODUCTOR ---
        const audio = document.getElementById('radioStream');
        const playBtn = document.getElementById('playBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const visualizer = document.getElementById('visualizer');
        const tituloRadio = document.querySelector('h1');
        const subtituloRadio = document.querySelector('p');
        const numOyentesElemento = document.getElementById('numOyentes');

        audio.volume = 0.5; 

        // --- 2. CONFIGURACIÓN FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyCs4PnCfDpGvEP5kKbIFe6H-QgF1HVAtWE",
            authDomain: "roboclass-b929a.firebaseapp.com",
            projectId: "roboclass-b929a",
            storageBucket: "roboclass-b929a.firebasestorage.app",
            messagingSenderId: "719167351070",
            appId: "1:719167351070:web:3d5df1e151eed11748810f"
        };

        // --- 3. INICIALIZAR FIREBASE ---
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let playlist = [];
        let cancionActual = 0;
        let autoDjActivo = false;

        // --- 4. CARGAR PLAYLIST ---
        db.collection("playlist_emergencia")
          .where("activa", "==", true)
          .orderBy("orden")
          .get()
          .then((querySnapshot) => {
              querySnapshot.forEach((doc) => {
                  playlist.push(doc.data());
              });
              console.log("Playlist cargada:", playlist.length);
          });

        // --- 5. LÓGICA AUTODJ ---
        function activarAutoDJ() {
            if (playlist.length > 0 && !autoDjActivo) {
                autoDjActivo = true;
                reproducirCancion(0);
                playBtn.innerHTML = '⏸️ Pausar';
            }
        }

        function reproducirCancion(indice) {
            if (indice >= playlist.length) indice = 0;
            cancionActual = indice;
            const cancion = playlist[indice];
            if (!cancion.url_audio) return;

            audio.src = cancion.url_audio;
            audio.play().then(() => {
                visualizer.classList.add('active');
                tituloRadio.innerText = "AutoDJ Activado";
                subtituloRadio.innerText = "🎶 " + cancion.titulo + " - " + cancion.artista;
            });
        }

        audio.addEventListener('ended', () => {
            if (autoDjActivo) reproducirCancion(cancionActual + 1);
        });

        // --- 6. CONTROLES ---
        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play().then(() => {
                    playBtn.innerHTML = '⏸️ Pausar';
                    visualizer.classList.add('active');
                }).catch(() => {
                    activarAutoDJ();
                });
            } else {
                audio.pause();
                playBtn.innerHTML = '▶️ Escuchar';
                visualizer.classList.remove('active');
            }
        });

        volumeSlider.addEventListener('input', (e) => { audio.volume = e.target.value; });

        // --- 7. DETECTOR DE RETORNO ---
        setInterval(() => {
            if (autoDjActivo) {
                let URL_VIVO = "https://radios.yanapak.org/cecap?nocache=" + Date.now();
                let testAudio = new Audio(URL_VIVO);
                testAudio.volume = 0;
                testAudio.play().then(() => {
                    autoDjActivo = false;
                    testAudio.pause();
                    audio.pause();
                    audio.src = "https://radios.yanapak.org/cecap";
                    audio.play();
                    tituloRadio.innerText = "Radio CECAP Rivera";
                    subtituloRadio.innerText = "Transmitiendo en vivo...";
                }).catch(() => { console.log("Sigue off..."); });
            }
        }, 20000);

        // --- 8. CONTADOR DE OYENTES (EL QUE FALTABA) ---
        async function gestionarOyente() {
            try {
                // Registrar este nuevo oyente
                const ref = await db.collection("oyentes_activos").add({
                    hora: firebase.firestore.FieldValue.serverTimestamp()
                });

                // Borrar registro al cerrar pestaña
                window.addEventListener('unload', () => {
                    ref.delete();
                });

                console.log("Oyente conectado.");
            } catch (e) {
                console.error("Error contador:", e);
            }
        }

        // Escuchar en tiempo real cuántos hay
        db.collection("oyentes_activos").onSnapshot((snapshot) => {
            numOyentesElemento.innerText = snapshot.size;
        });

        gestionarOyente(); // Arrancar el contador
    </script>
</body>
</html>
